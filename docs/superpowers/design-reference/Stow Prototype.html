<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stow — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=geist@400,500,600&display=swap" rel="stylesheet" />
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, #20202c 0%, #14141c 55%, #0d0d13 100%);
    font-family: "Inter Tight", system-ui, sans-serif;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; }
  .stow-root {
    width: 100%; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .device-scale { transform-origin: center center; will-change: transform; }

  @keyframes stowUp { from { transform: translateY(18px); } to { transform: translateY(0); } }
  @keyframes stowPop { from { transform: scale(0.96); } to { transform: scale(1); } }
  @keyframes stowToast { from { transform: translate(-50%, 10px); } to { transform: translate(-50%, 0); } }
  @keyframes stowScan { 0% { top: 8px; } 50% { top: calc(100% - 11px); } 100% { top: 8px; } }
  @keyframes capSweep { 0% { transform: translateY(-40px); opacity: 0; } 10% { opacity: .85; } 90% { opacity: .85; } 100% { transform: translateY(820px); opacity: 0; } }
  @keyframes capPop { 0% { opacity: 0; transform: scale(.92); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes capDots { 0%, 20% { opacity: .25; } 50% { opacity: 1; } 80%, 100% { opacity: .25; } }
  @media (prefers-reduced-motion: reduce) { .stow-root *, .device-scale { animation: none !important; } }

  /* hide scrollbars inside the phone for cleanliness */
  .stow-root ::-webkit-scrollbar { width: 0; height: 0; }
  .stow-root * { scrollbar-width: none; }
  input, textarea, select, button { font-family: inherit; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="22" fill="#E8652B"/>
    <g transform="translate(50 50)" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0 -22 L20 -10 L20 12 L0 24 L-20 12 L-20 -10 Z"/>
      <path d="M-20 -10 L0 2 L20 -10 M0 2 L0 24"/>
    </g>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="stow/icons.jsx"></script>
<script type="text/babel" src="stow/data.jsx"></script>
<script type="text/babel" src="stow/components.jsx"></script>
<script type="text/babel" src="stow/screens-core.jsx"></script>
<script type="text/babel" src="stow/spaces-mgmt.jsx"></script>
<script type="text/babel" src="stow/screens-detail.jsx"></script>
<script type="text/babel" src="stow/photo.jsx"></script>
<script type="text/babel" src="stow/quick-capture.jsx"></script>
<script type="text/babel" src="stow/app.jsx"></script>

<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<window.StowApp />);

  // Scale the device to fit the viewport, leaving room for margins.
  function fitDevice() {
    const el = document.querySelector(".device-scale");
    if (!el) return requestAnimationFrame(fitDevice);
    const W = 402, H = 874;
    const scale = Math.min((window.innerWidth - 48) / W, (window.innerHeight - 48) / H, 1.15);
    el.style.transform = "scale(" + scale + ")";
  }
  window.addEventListener("resize", fitDevice);
  // run after first paint + a moment for fonts/layout
  requestAnimationFrame(() => { fitDevice(); setTimeout(fitDevice, 200); });
</script>
</body>
</html>
